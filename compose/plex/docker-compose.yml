services:
  plex:
    image: linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - VERSION=latest
      - UMASK=022
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    volumes:
      - ./config:/config
      - ${MEDIA_DIR}:/media
    # Décommenter si le serveur dispose d'un GPU Intel pour le transcodage matériel
    # devices:
    #   - /dev/dri:/dev/dri
    restart: unless-stopped
