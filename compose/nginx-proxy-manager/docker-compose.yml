services:
  proxy-manager:
    container_name: proxy-manager
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '127.0.0.1:81:81'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    healthcheck:
      test: curl -fsS http://localhost:81/api/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - proxy_manager

networks:
  proxy_manager:
    name: proxy_manager
    external: true
