services:
  tautulli:
    image: ghcr.io/tautulli/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    volumes:
      - ./config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
    extra_hosts:
      # Permet d'atteindre Plex (network_mode: host) via host.docker.internal:32400
      - "host.docker.internal:host-gateway"
    networks:
      - proxy_manager

networks:
  proxy_manager:
    external: true
