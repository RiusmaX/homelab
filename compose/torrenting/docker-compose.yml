services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ./prowlarr-config:/config
    healthcheck:
      test: curl -fsS http://localhost:9696/ping || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - proxy_manager

  rdtclient:
    image: rogerfar/rdtclient:latest
    container_name: rdtclient
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ./rdtclient-config:/data/db
      - ${DOWNLOADS_DIR}/rdtclient:/data/downloads/rdtclient
    healthcheck:
      test: curl -fsS http://localhost:6500/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - proxy_manager

networks:
  proxy_manager:
    external: true
