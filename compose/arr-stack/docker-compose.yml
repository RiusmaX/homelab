services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ./radarr-config:/config
      - ${MEDIA_DIR}:/media
      - ${DOWNLOADS_DIR}/rdtclient:/downloads
      - ../../scripts:/scripts:rw
      - ../../scripts/init-alpine.sh:/custom-cont-init.d/init-alpine.sh:ro
    restart: unless-stopped
    networks:
      - proxy_manager

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ./sonarr-config:/config
      - ${MEDIA_DIR}:/media
      - ${DOWNLOADS_DIR}/rdtclient:/downloads
      - ../../scripts:/scripts:rw
      - ../../scripts/init-alpine.sh:/custom-cont-init.d/init-alpine.sh:ro
    restart: unless-stopped
    networks:
      - proxy_manager

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    depends_on:
      - radarr
      - sonarr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Paris}
      - PORT=5055
    extra_hosts:
      # Permet d'atteindre Plex (network_mode: host) via host.docker.internal:32400
      - "host.docker.internal:host-gateway"
    volumes:
      - ./seerr-config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - proxy_manager

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Paris}
    restart: unless-stopped
    networks:
      - proxy_manager

networks:
  proxy_manager:
    external: true
